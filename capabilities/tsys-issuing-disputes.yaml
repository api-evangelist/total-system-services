naftiko: 1.0.0-alpha2
info:
  label: TSYS Issuing Platform — Disputes
  description: 'TSYS Issuing Platform — Disputes. 2 operations. Lead operation: List Disputes. Self-contained Naftiko capability
    covering one Total System Services business surface.'
  tags:
  - Total System Services
  - Disputes
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TOTAL_SYSTEM_SERVICES_API_KEY: TOTAL_SYSTEM_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: tsys-issuing-disputes
    baseUri: https://issuing.api.tsys.com/v1
    description: TSYS Issuing Platform — Disputes business capability. Self-contained, no shared references.
    resources:
    - name: disputes
      path: /disputes
      operations:
      - name: listdisputes
        method: GET
        description: List Disputes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
        - name: page
          in: query
          type: integer
        - name: limit
          in: query
          type: integer
      - name: createdispute
        method: POST
        description: Create Dispute
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.TOTAL_SYSTEM_SERVICES_API_KEY}}'
  exposes:
  - type: rest
    namespace: tsys-issuing-disputes-rest
    port: 8080
    description: REST adapter for TSYS Issuing Platform — Disputes. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/disputes
      name: disputes
      description: REST surface for disputes.
      operations:
      - method: GET
        name: listdisputes
        description: List Disputes
        call: tsys-issuing-disputes.listdisputes
        with:
          status: rest.status
          page: rest.page
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createdispute
        description: Create Dispute
        call: tsys-issuing-disputes.createdispute
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: tsys-issuing-disputes-mcp
    port: 9090
    transport: http
    description: MCP adapter for TSYS Issuing Platform — Disputes. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-disputes
      description: List Disputes
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tsys-issuing-disputes.listdisputes
      with:
        status: tools.status
        page: tools.page
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: create-dispute
      description: Create Dispute
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: tsys-issuing-disputes.createdispute
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
