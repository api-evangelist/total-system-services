naftiko: "1.0.0-alpha1"

info:
  label: "TSYS Issuing Platform"
  description: "Card issuing API for managing cardholder accounts, issuing physical and virtual cards, setting spending controls, reviewing transaction history, and handling disputes."
  tags:
    - Card Issuing
    - Cardholder Management
    - Fintech
    - Digital Payments
    - Spending Controls
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TSYS_ISSUING_TOKEN: TSYS_ISSUING_TOKEN

capability:
  consumes:
    - type: http
      namespace: tsys-issuing
      baseUri: https://issuing.api.tsys.com/v1
      description: "TSYS Issuing Platform API for card program management"
      authentication:
        type: bearer
        token: "{{TSYS_ISSUING_TOKEN}}"
      resources:
        - name: accounts
          path: /accounts
          description: "Cardholder account management"
          operations:
            - name: list-accounts
              method: GET
              description: "List all cardholder accounts"
              inputParameters:
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by status"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-account
              method: POST
              description: "Create a new cardholder account"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cardholder: "{{tools.cardholder}}"
                  creditLimit: "{{tools.creditLimit}}"
        - name: account
          path: /accounts/{accountId}
          description: "Individual account operations"
          operations:
            - name: get-account
              method: GET
              description: "Get cardholder account details"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                  description: "Account identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: account-cards
          path: /accounts/{accountId}/cards
          description: "Cards for an account"
          operations:
            - name: list-account-cards
              method: GET
              description: "List all cards for an account"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                  description: "Account identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: issue-card
              method: POST
              description: "Issue a new card for an account"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                  description: "Account identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  type: "{{tools.type}}"
                  network: "{{tools.network}}"
        - name: card-transactions
          path: /cards/{cardId}/transactions
          description: "Card transaction history"
          operations:
            - name: list-card-transactions
              method: GET
              description: "Get transaction history for a card"
              inputParameters:
                - name: cardId
                  in: path
                  type: string
                  required: true
                  description: "Card identifier"
                - name: startDate
                  in: query
                  type: string
                  required: false
                  description: "Start date"
                - name: endDate
                  in: query
                  type: string
                  required: false
                  description: "End date"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: card-controls
          path: /cards/{cardId}/controls
          description: "Card spending controls"
          operations:
            - name: get-card-controls
              method: GET
              description: "Get spending controls for a card"
              inputParameters:
                - name: cardId
                  in: path
                  type: string
                  required: true
                  description: "Card identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: disputes
          path: /disputes
          description: "Transaction dispute management"
          operations:
            - name: list-disputes
              method: GET
              description: "List transaction disputes"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-dispute
              method: POST
              description: "File a transaction dispute"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  transactionId: "{{tools.transactionId}}"
                  reason: "{{tools.reason}}"
                  amount: "{{tools.amount}}"

  exposes:
    - type: rest
      port: 8101
      namespace: tsys-issuing-api
      resources:
        - path: /v1/accounts
          name: accounts
          description: "Cardholder accounts"
          operations:
            - method: GET
              name: list-accounts
              description: "List accounts"
              call: "tsys-issuing.list-accounts"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-account
              description: "Create account"
              call: "tsys-issuing.create-account"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/disputes
          name: disputes
          description: "Transaction disputes"
          operations:
            - method: GET
              name: list-disputes
              description: "List disputes"
              call: "tsys-issuing.list-disputes"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: tsys-issuing-mcp
      transport: http
      tools:
        - name: list-accounts
          description: "List cardholder accounts in the card program"
          hints:
            readOnly: true
            openWorld: true
          call: "tsys-issuing.list-accounts"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-account
          description: "Create a new cardholder account"
          hints:
            readOnly: false
          call: "tsys-issuing.create-account"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-account
          description: "Get details for a specific cardholder account"
          hints:
            readOnly: true
            idempotent: true
          call: "tsys-issuing.get-account"
          with:
            accountId: "tools.accountId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-account-cards
          description: "List all cards associated with an account"
          hints:
            readOnly: true
            openWorld: true
          call: "tsys-issuing.list-account-cards"
          with:
            accountId: "tools.accountId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: issue-card
          description: "Issue a new physical or virtual card for an account"
          hints:
            readOnly: false
          call: "tsys-issuing.issue-card"
          with:
            accountId: "tools.accountId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-card-transactions
          description: "Get transaction history for a specific card"
          hints:
            readOnly: true
            openWorld: true
          call: "tsys-issuing.list-card-transactions"
          with:
            cardId: "tools.cardId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-card-controls
          description: "Get spending controls and limits for a card"
          hints:
            readOnly: true
            idempotent: true
          call: "tsys-issuing.get-card-controls"
          with:
            cardId: "tools.cardId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-disputes
          description: "List transaction disputes in the program"
          hints:
            readOnly: true
            openWorld: true
          call: "tsys-issuing.list-disputes"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-dispute
          description: "File a dispute for a specific card transaction"
          hints:
            readOnly: false
          call: "tsys-issuing.create-dispute"
          outputParameters:
            - type: object
              mapping: "$."
