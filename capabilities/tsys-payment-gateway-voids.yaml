naftiko: 1.0.0-alpha2
info:
  label: TSYS Payment Gateway — Voids
  description: 'TSYS Payment Gateway — Voids. 1 operations. Lead operation: Void Transaction. Self-contained Naftiko capability
    covering one Total System Services business surface.'
  tags:
  - Total System Services
  - Voids
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TOTAL_SYSTEM_SERVICES_API_KEY: TOTAL_SYSTEM_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: tsys-payment-gateway-voids
    baseUri: https://api.tsys.com/v1
    description: TSYS Payment Gateway — Voids business capability. Self-contained, no shared references.
    resources:
    - name: transactions-transactionId-void
      path: /transactions/{transactionId}/void
      operations:
      - name: voidtransaction
        method: POST
        description: Void Transaction
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: transactionId
          in: path
          type: string
          description: The transaction ID to void
          required: true
    authentication:
      type: apikey
      key: X-TSYS-API-Key
      value: '{{env.TOTAL_SYSTEM_SERVICES_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: tsys-payment-gateway-voids-rest
    port: 8080
    description: REST adapter for TSYS Payment Gateway — Voids. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/transactions/{transactionid}/void
      name: transactions-transactionid-void
      description: REST surface for transactions-transactionId-void.
      operations:
      - method: POST
        name: voidtransaction
        description: Void Transaction
        call: tsys-payment-gateway-voids.voidtransaction
        with:
          transactionId: rest.transactionId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: tsys-payment-gateway-voids-mcp
    port: 9090
    transport: http
    description: MCP adapter for TSYS Payment Gateway — Voids. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: void-transaction
      description: Void Transaction
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: tsys-payment-gateway-voids.voidtransaction
      with:
        transactionId: tools.transactionId
      outputParameters:
      - type: object
        mapping: $.
