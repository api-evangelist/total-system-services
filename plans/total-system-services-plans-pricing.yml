description: TSYS (Total System Services), now part of Global Payments, is a wholesale payments processor
  serving issuers, acquirers, and merchant-services partners. Pricing is contracted per institution —
  there is no published per-call rate card or self-service developer plan. The TSYS Payment Gateway, Issuing
  Platform, and Merchant Services APIs are exposed under contract, not as public consumption tiers.
sources:
  - https://www.tsys.com/
notes: WebFetch on https://www.tsys.com/solutions returned 403. TSYS's payments-platform pricing is contracted
  B2B and not publicly listed. Captured as a single Contact Sales plan.
plans:
  - id: total-system-services-contact-sales
    name: TSYS Platform (Contact Sales)
    type: enterprise
    description: TSYS Payment Gateway, Issuing Platform, and Merchant Services are licensed under negotiated
      processor agreements. Rates depend on transaction volume, card-network mix, and product configuration.
      Contact Global Payments / TSYS sales for pricing.
