      - Credit Card
      - Transactions
      - POS
    humanURL: https://developers.tsys.com/
    properties:
      - url: https://developers.tsys.com/
        type: Documentation
      - url: openapi/tsys-payment-gateway-openapi.yml
        type: OpenAPI
    description: >-
      TSYS Payment Gateway API enables merchants to process credit, debit, and
      prepaid card transactions. Supports authorization, capture, void, and
      refund operations for card-present and card-not-present payment scenarios.
  - aid: total-system-services:tsys-issuing
    name: TSYS Issuing Platform
    tags:
      - Payments
      - Card Issuing
      - Account Management
      - Digital Payments
      - Fintech
    humanURL: https://www.tsys.com/platform
    properties:
      - url: https://www.tsys.com/platform
        type: Documentation
      - url: openapi/tsys-issuing-openapi.yml
        type: OpenAPI
    description: >-
      TSYS Issuing Platform provides an API-driven payment stack for financial
      institutions and fintechs to issue debit and credit cards, manage cardholder
      accounts, set spending controls, and handle transaction disputes.
  - aid: total-system-services:tsys-merchant
    name: TSYS Merchant Services
    tags:
      - Payments
      - Merchant Management
      - Acquiring
      - Boarding
      - Settlement
    humanURL: https://docs.tsysmerchant.com/
