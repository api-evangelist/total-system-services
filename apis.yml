description: >-
  Total System Services (TSYS) was a leading global payment solutions provider
  offering payment processing services to financial and nonfinancial institutions
  before merging with Global Payments in 2019. TSYS provides an end-to-end payment
  stack spanning payment gateway services for merchants, card issuing for banks and
  fintechs, merchant acquiring and boarding, virtual card programs, and comprehensive
  reporting. The TSYS developer portal provides APIs for transaction processing,
  cardholder management, merchant services, and commercial virtual solutions.
