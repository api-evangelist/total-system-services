providerId: total-system-services
publisherName: Global Payments Inc.
serviceCategory: Payments Processing
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Payments
  - Payment Processing
  - Card Issuing
  - Merchant Services
  - FinOps
  - FOCUS
description: 'TSYS (now part of Global Payments) bills processing partners on contracted per-transaction
  and platform-fee terms. There is no public meter rate card; this artifact describes the structural shape
  only.'
sources:
  - https://www.tsys.com/
notes: Pricing not publicly retrievable; meters are descriptive and unpriced.
billingModel:
  pricingCategory: Contracted Per-Transaction + Platform Fee
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Total System Services
  ServiceCategory: Payments Processing
  ProviderName: Total System Services
  PublisherName: Global Payments Inc.
  InvoiceIssuerName: Global Payments Inc.
  BillingCurrency: USD
meters:
  - name: card_transactions_processed
    description: Authorizations, captures, refunds, and reversals processed through TSYS Payment Gateway
      or Merchant Services.
    unit: transaction
    aggregation: sum
    dimensions:
      - card_brand
      - card_present
      - region
  - name: accounts_on_file
    description: Cardholder accounts maintained on the TSYS Issuing Platform.
    unit: account-month
    aggregation: avg
    dimensions:
      - product
      - region
  - name: platform_fee
    description: Monthly platform / connectivity fee separate from per-transaction pricing.
    unit: month
    aggregation: sum
    dimensions:
      - service
principles:
  - name: Visibility
    description: Reconcile the monthly TSYS settlement statement against your switch / authorization logs;
      because rates are tiered by network and volume, line-item detail must be requested from your TSYS
      relationship manager.
  - name: Allocation
    description: Attribute processing fees per card product / merchant-of-record entity. Keep BIN, MID,
      and chain hierarchy in your COA so chargeback maps to the correct cost center.
  - name: Optimization
    description: Routinely review network routing (debit network choice), interchange-optimization data
      submission quality (Level 2/3), and tier breakpoints to keep the blended take-rate near contract
      floor.
  - name: Accountability
    description: Treasury / payments operations owns reconciliation against TSYS; product owners own
      issuing-platform fees per program.
maintainers:
